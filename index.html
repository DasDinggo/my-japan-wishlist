function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function fp(j,c){if(!j)return null;if(c==="JPY")return"\u00A5"+j.toLocaleString();var i=Math.round(j*RATE);return"Rp"+i.toLocaleString("id-ID");}
function fps(j,c){if(!j)return"\u2014";if(c==="JPY")return"\u00A5"+j.toLocaleString();var i=Math.round(j*RATE);if(i>=1000000)return"Rp"+(i/1000000).toFixed(1)+"jt";if(i>=1000)return"Rp"+(i/1000).toFixed(0)+"rb";return"Rp"+i.toLocaleString("id-ID");}
 
function detectCluster(city,address){
  if(!address||!city)return "";
  var lower=address.toLowerCase();
  var rules=CLUSTER_KEYS[city];
  if(!rules)return "";
  for(var i=0;i<rules.length;i++){var rule=rules[i];for(var j=0;j<rule.k.length;j++){if(lower.indexOf(rule.k[j])>=0)return rule.c;}}
  return "";
}
 
function makeMapSearchUrl(stores){
  if(!stores||stores.length===0)return "#";
  if(stores.length===1){
    var q=encodeURIComponent(stores[0].address||(stores[0].name+", "+stores[0].city));
    return "https://www.google.com/maps/search/?api=1&query="+q;
  }
  var queries=stores.map(function(s){return s.address||(s.name+", "+s.city);});
  return "https://www.google.com/maps/search/"+encodeURIComponent(queries.join(" / "));
}
 
function makeRouteUrl(stores){
  if(!stores||stores.length===0)return "#";
  if(stores.length===1){
    var q=encodeURIComponent(stores[0].address||(stores[0].name+", "+stores[0].city));
    return "https://www.google.com/maps/dir/?api=1&destination="+q+"&travelmode=walking";
  }
  var parts=stores.map(function(s){return encodeURIComponent(s.address||(s.name+", "+s.city));});
  return "https://www.google.com/maps/dir/"+parts.join("/");
}
 
function makeClusterRouteUrl(stores){
  if(!stores||stores.length===0)return "#";
  var parts=stores.map(function(s){return encodeURIComponent(s.address||(s.name+", "+s.city));});
  return "https://www.google.com/maps/dir/"+parts.join("/");
}

var toastT=null;

  var el=document.getElementById("t-el");if(el)el.remove();
  var d=document.createElement("div");d.id="t-el";d.className="toast";d.textContent=msg;

function buildDashboard(){

  var pct=total?Math.round(done/total*100):0;
  var tJPY=items.reduce(function(s,i){return s+(i.estimatedPrice||0);},0);
  var dJPY=items.filter(function(i){return i.completed;}).reduce(function(s,i){return s+(i.estimatedPrice||0);},0);
  var byCat={};CATS.forEach(function(c){byCat[c]={n:0,cost:0,done:0};});
  items.forEach(function(i){byCat[i.category].n++;byCat[i.category].cost+=i.estimatedPrice||0;if(i.completed)byCat[i.category].done++;});
  var aCats=CATS.filter(function(c){return byCat[c].n>0;});
  var byCity={};CITIES.forEach(function(c){byCity[c]={n:0,cost:0};});
  items.forEach(function(i){byCity[i.city].n++;byCity[i.city].cost+=i.estimatedPrice||0;});
  var PIE=80,CX=92,CY=92,ang=-Math.PI/2,paths="";

    var sw=Math.min(frac*2*Math.PI,2*Math.PI-0.001);
    var x1=CX+PIE*Math.cos(ang),y1=CY+PIE*Math.sin(ang);ang+=sw;
    var x2=CX+PIE*Math.cos(ang),y2=CY+PIE*Math.sin(ang);

  });

  "<div class='card'><div class='card-lbl'>BY CATEGORY</div>"+(total===0?"<div class='empty'>Add items to see breakdown</div>":"<div class='pie-wrap'><svg width='184' height='184' viewBox='0 0 184 184' style='flex-shrink:0;max-width:100%;height:auto'>"+paths+"<circle cx='"+CX+"' cy='"+CY+"' r='36' fill='#EDEAE4'/><text x='"+CX+"' y='"+(CY-6)+"' text-anchor='middle' fill='#2C2820' font-size='20' font-weight='700'>"+total+"</text><text x='"+CX+"' y='"+(CY+10)+"' text-anchor='middle' fill='#9E9186' font-size='8' letter-spacing='1'>ITEMS</text></svg><div>"+aCats.map(function(cat){var p=PAL[cat];return"<div class='legend-item'><span class='ldot' style='background:"+p.d+"'></span><span class='lcat'>"+esc(cat)+"</span><span class='ln'>"+byCat[cat].n+"</span><span class='lc' style='color:"+p.d+"'>"+fps(byCat[cat].cost,currency)+"</span></div>";}).join("")+"</div></div>")+"</div>"+

  var activeCities=CITIES.filter(function(c){return byCity[c]>0;});
  var maxC=activeCities.length>0?Math.max.apply(null,activeCities.map(function(c){return byCity[c];})):1;
  var fil=stores.filter(function(s){if(sCat!=="All"&&s.category!==sCat)return false;if(sCity!=="All"&&s.city!==sCity)return false;if(sSrch&&s.name.toLowerCase().indexOf(sSrch.toLowerCase())<0)return false;return true;});

      }).join("")+"</div>";

      "<a href='"+makeRouteUrl(fil)+"' target='_blank' class='map-btn-route'>Plan route \u2197</a>"+

  return "<div class='overlay' id='ov'><div class='sheet'><div class='shandle'></div><div class='shead'><div class='stitle'>"+(editId?"Edit Wish":"New Wish")+"</div><button class='sdone' id='closebtn'>Done</button></div><div class='sbody'>"+
    "<div class='fmb'><div class='flbl'>Item Name</div><input class='inp' id='fn' placeholder='What do you want?' value='"+esc(fd.name)+"'/></div>"+
    "<div class='frow'><div><div class='flbl'>Category</div><select class='inp' id='fcat'>"+CATS.map(function(c){return"<option value='"+esc(c)+"'"+(fd.category===c?" selected":"")+">"+esc(c)+"</option>";}).join("")+"</select></div><div><div class='flbl'>City</div><select class='inp' id='fcity'>"+CITIES.map(function(c){return"<option value='"+esc(c)+"'"+(fd.city===c?" selected":"")+">"+esc(c)+"</option>";}).join("")+"</select></div></div>"+
    "<div class='fmb'><div class='flbl'>What is it for?</div><input class='inp' id='fpurp' placeholder='Personal use, gift\u2026' value='"+esc(fd.purpose)+"'/></div>"+
    "<div class='fmb'><div class='flbl'>Where to Find \u2014 "+esc(fd.city)+"</div>"+locHtml+"</div>"+
    "<div class='fmb'><div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:7px'><div class='flbl' style='margin-bottom:0'>Estimated Price</div><div class='ptoggle'><button class='popt"+(fPriceCur==="JPY"?" on":"")+"' id='pjpy'>\u00A5 JPY</button><button class='popt"+(fPriceCur==="IDR"?" on":"")+"' id='pidr'>Rp IDR</button></div></div><input class='inp' id='fprice' type='number' placeholder='"+(fPriceCur==="JPY"?"Amount in \u00A5":"Amount in Rp")+"' value='"+esc(fd.price)+"'/><div class='phint' id='phint'>"+esc(prev)+"</div></div>"+
    "<div class='fmb'><div class='flbl'>Remarks (optional)</div><textarea class='inp' id='frmk' placeholder='Notes, size, colour\u2026' style='min-height:72px;line-height:1.5'>"+esc(fd.remarks)+"</textarea></div>"+
    "<div class='fmb'><div class='flbl'>Product Link (optional)</div><input class='inp' id='flink' type='url' placeholder='https://\u2026' value='"+esc(fd.link)+"'/></div>"+
    "<div class='fmb'><div class='flbl'>Address (optional)</div><input class='inp' id='faddr' placeholder='Street address or Google Maps link\u2026' value='"+esc(fd.address)+"'/></div>"+
  "</div><div class='sfoot'><button class='cancelbtn' id='cancelbtn'>Cancel</button><button class='savebtn' id='savebtn'"+(fd.name.trim()?"":" disabled")+">"+(editId?"Save Changes":"Add to Wishlist")+"</button></div></div></div>";
}
 
function buildStoreForm(){
  var autoMsg=sAutoCluster?"Auto-detected: "+sAutoCluster:"";
  return "<div class='overlay' id='sov'><div class='sheet'><div class='shandle'></div><div class='shead'><div class='stitle'>"+(sEditId?"Edit Store":"New Store")+"</div><button class='sdone' id='sclosebtn'>Done</button></div><div class='sbody'>"+
    "<div class='fmb'><div class='flbl'>Store Name</div><input class='inp' id='sfn' placeholder='e.g. Yodobashi Camera Akihabara' value='"+esc(sfd.name)+"'/></div>"+
    "<div class='frow'><div><div class='flbl'>Category</div><select class='inp' id='sfcat'>"+CATS.map(function(c){return"<option value='"+esc(c)+"'"+(sfd.category===c?" selected":"")+">"+esc(c)+"</option>";}).join("")+"</select></div><div><div class='flbl'>City</div><select class='inp' id='sfcity'>"+CITIES.map(function(c){return"<option value='"+esc(c)+"'"+(sfd.city===c?" selected":"")+">"+esc(c)+"</option>";}).join("")+"</select></div></div>"+
    "<div class='fmb'><div class='flbl'>Address (optional)</div><input class='inp' id='sfaddr' placeholder='Street address, area or landmark\u2026' value='"+esc(sfd.address)+"'/>"+(autoMsg?"<div class='auto-tag'>"+esc(autoMsg)+"</div>":"")+"</div>"+
    "<div class='fmb'><div class='flbl'>Cluster / Area tag</div><input class='inp' id='sfcluster' placeholder='e.g. Nipponbashi, Akihabara\u2026' value='"+esc(sfd.cluster)+"'/><div style='font-size:11px;color:#9E9186;margin-top:5px'>Stores with the same cluster tag will be grouped with a route button</div></div>"+
    "<div class='fmb'><div class='flbl'>Notes (optional)</div><textarea class='inp' id='sfnotes' placeholder='Opening hours, tips, floor\u2026' style='min-height:72px;line-height:1.5'>"+esc(sfd.notes)+"</textarea></div>"+
  "</div><div class='sfoot'><button class='cancelbtn' id='scancelbtn'>Cancel</button><button class='savebtn' id='ssavebtn'"+(sfd.name.trim()?"":" disabled")+">"+(sEditId?"Save Changes":"Add Store")+"</button></div></div></div>";
}
 
function bind(){
  function on(id,ev,fn){var el=document.getElementById(id);if(el)el.addEventListener(ev,fn);}
  function all(sel,fn){document.querySelectorAll(sel).forEach(fn);}
  on("cbtn","click",function(){currency=currency==="JPY"?"IDR":"JPY";render();});
  on("tdash","click",function(){tab="dashboard";render();});
  on("titems","click",function(){tab="items";render();});
  on("tstores","click",function(){tab="stores";render();});
  on("compbtn","click",function(){compactMode=!compactMode;render();});
  on("abtn","click",function(){fd={name:"",category:"Food & Drinks",purpose:"",city:"Tokyo",location:"",address:"",cluster:"",price:"",remarks:"",link:""};fCustomLoc=false;fPriceCur="JPY";editId=null;showForm=true;render();});
  on("sinp","input",function(e){srch=e.target.value;render();});
  all("[data-stat]",function(b){b.addEventListener("click",function(){fStat=b.dataset.stat;render();});});
  all("[data-city]",function(b){b.addEventListener("click",function(){fCity=b.dataset.city;render();});});
  all("[data-catt]",function(b){b.addEventListener("click",function(){fCat=b.dataset.catt;render();});});
  all("[data-tog]",function(b){b.addEventListener("click",function(){var id=b.dataset.tog;items=items.map(function(i){return i.id===id?Object.assign({},i,{completed:!i.completed}):i;});save();render();});});
  all("[data-del]",function(b){b.addEventListener("click",function(){items=items.filter(function(i){return i.id!==b.dataset.del;});save();toast("Item removed");render();});});
  all("[data-edit]",function(b){b.addEventListener("click",function(){var id=b.dataset.edit,item=null;for(var i=0;i<items.length;i++){if(items[i].id===id){item=items[i];break;}}if(!item)return;fd={name:item.name,category:item.category,purpose:item.purpose||"",city:item.city,location:item.location||"",address:item.address||"",cluster:item.cluster||"",price:item.estimatedPrice?String(item.estimatedPrice):"",remarks:item.remarks||"",link:item.link||""};fCustomLoc=false;fPriceCur="JPY";editId=id;showForm=true;render();});});
  on("sabtn","click",function(){sfd={name:"",category:"Food & Drinks",city:"Tokyo",address:"",cluster:"",notes:""};sEditId=null;sAutoCluster="";showStoreForm=true;render();});
  on("ssinp","input",function(e){sSrch=e.target.value;render();});
  all("[data-scity]",function(b){b.addEventListener("click",function(){sCity=b.dataset.scity;render();});});
  all("[data-scat]",function(b){b.addEventListener("click",function(){sCat=b.dataset.scat;render();});});
  all("[data-sdel]",function(b){b.addEventListener("click",function(){stores=stores.filter(function(s){return s.id!==b.dataset.sdel;});saveStores();toast("Store removed");render();});});
  all("[data-sedit]",function(b){b.addEventListener("click",function(){var id=b.dataset.sedit,store=null;for(var i=0;i<stores.length;i++){if(stores[i].id===id){store=stores[i];break;}}if(!store)return;sfd={name:store.name,category:store.category,city:store.city,address:store.address||"",cluster:store.cluster||"",notes:store.notes||""};sEditId=id;sAutoCluster="";showStoreForm=true;render();});});
  on("ov","click",function(e){if(e.target===document.getElementById("ov")){showForm=false;editId=null;render();}});
  on("closebtn","click",function(){showForm=false;editId=null;render();});
  on("cancelbtn","click",function(){showForm=false;editId=null;render();});
  on("fn","input",function(e){fd.name=e.target.value;var sb=document.getElementById("savebtn");if(sb)sb.disabled=!e.target.value.trim();});
  on("fcat","change",function(e){fd.category=e.target.value;fd.location="";fCustomLoc=false;render();});
  on("fcity","change",function(e){fd.city=e.target.value;fd.location="";fCustomLoc=false;render();});
  on("fpurp","input",function(e){fd.purpose=e.target.value;});
  on("fprice","input",function(e){fd.price=e.target.value;var pv=parseFloat(e.target.value),ph=document.getElementById("phint");if(ph)ph.textContent=(!isNaN(pv)&&pv>0)?(fPriceCur==="JPY"?"\u2248 Rp"+Math.round(pv*RATE).toLocaleString("id-ID"):"\u2248 \u00A5"+Math.round(pv/RATE).toLocaleString()):"";});
  on("frmk","input",function(e){fd.remarks=e.target.value;});
  on("flink","input",function(e){fd.link=e.target.value;});
  on("faddr","input",function(e){fd.address=e.target.value;});
  on("locinp","input",function(e){fd.location=e.target.value;});
  on("pjpy","click",function(){if(fPriceCur!=="JPY"){var v=parseFloat(fd.price);if(!isNaN(v)&&v>0)fd.price=String(Math.round(v/RATE));fPriceCur="JPY";render();}});
  on("pidr","click",function(){if(fPriceCur!=="IDR"){var v=parseFloat(fd.price);if(!isNaN(v)&&v>0)fd.price=String(Math.round(v*RATE));fPriceCur="IDR";render();}});
  all("[data-sg]",function(b){b.addEventListener("click",function(){fd.location=b.dataset.sg;render();});});
  on("custbtn","click",function(){fCustomLoc=true;fd.location="";render();});
  on("backbtn","click",function(){fCustomLoc=false;fd.location="";render();});
  on("savebtn","click",function(){if(!fd.name.trim())return;var jpy=parseFloat(fd.price)||0;if(fPriceCur==="IDR")jpy=Math.round(jpy/RATE);if(editId){items=items.map(function(i){if(i.id!==editId)return i;return Object.assign({},i,{name:fd.name,category:fd.category,purpose:fd.purpose,city:fd.city,location:fd.location,address:fd.address,cluster:fd.cluster,estimatedPrice:jpy,remarks:fd.remarks,link:fd.link});});save();showForm=false;editId=null;toast("Item updated \u2713");render();}else{items=[{id:uid(),name:fd.name,category:fd.category,purpose:fd.purpose,city:fd.city,location:fd.location,address:fd.address,cluster:fd.cluster,estimatedPrice:jpy,completed:false,createdAt:Date.now(),remarks:fd.remarks,link:fd.link}].concat(items);save();showForm=false;toast("Added to wishlist \u2713");render();}});
  on("sov","click",function(e){if(e.target===document.getElementById("sov")){showStoreForm=false;sEditId=null;render();}});
  on("sclosebtn","click",function(){showStoreForm=false;sEditId=null;render();});
  on("scancelbtn","click",function(){showStoreForm=false;sEditId=null;render();});
  on("sfn","input",function(e){sfd.name=e.target.value;var sb=document.getElementById("ssavebtn");if(sb)sb.disabled=!e.target.value.trim();});
  on("sfcat","change",function(e){sfd.category=e.target.value;});
  on("sfcity","change",function(e){sfd.city=e.target.value;var det=detectCluster(sfd.city,sfd.address);if(det){sfd.cluster=det;sAutoCluster=det;}render();});
  on("sfaddr","input",function(e){sfd.address=e.target.value;var det=detectCluster(sfd.city,sfd.address);if(det&&!sfd.cluster)sfd.cluster=det;sAutoCluster=det;var clEl=document.getElementById("sfcluster");if(clEl&&det&&!clEl.value)clEl.value=det;var atEl=document.querySelector(".auto-tag");if(atEl)atEl.textContent=det?"Auto-detected: "+det:"";});
  on("sfcluster","input",function(e){sfd.cluster=e.target.value;});
  on("sfnotes","input",function(e){sfd.notes=e.target.value;});
  on("ssavebtn","click",function(){if(!sfd.name.trim())return;var clEl=document.getElementById("sfcluster");var clusterVal=clEl?clEl.value.trim():sfd.cluster;if(sEditId){stores=stores.map(function(s){if(s.id!==sEditId)return s;return Object.assign({},s,{name:sfd.name,category:sfd.category,city:sfd.city,address:sfd.address,cluster:clusterVal,notes:sfd.notes});});saveStores();showStoreForm=false;sEditId=null;toast("Store updated \u2713");render();}else{stores=stores.concat([{id:uid(),name:sfd.name,category:sfd.category,city:sfd.city,address:sfd.address,cluster:clusterVal,notes:sfd.notes,createdAt:Date.now()}]);saveStores();showStoreForm=false;toast("Store added \u2713");render();}});
}
 
render();
</script>
</body>
</html>
